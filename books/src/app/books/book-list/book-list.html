<p>book-list works!</p>




@if(books.length < 1) { <p>Leider keine Bücher vorhanden.</p>
    }
    @else { <table>
        <button (click)="toggleCover()">Cover ein/ausschalten</button>

        <tr class="zeile">
            <td>ISBN</td>
            <td>Titel</td>
            <td>Preis in Euro</td>
            <td>Bewertung</td>
            <td>Cover</td>
        </tr>

        @for(book of books; track book.isbn) {
        <tr class="zeile">
            <td>{{book.isbn}}</td>
            <td>{{book.title}}</td>
            <td [ngClass]="{'on-discount': book.price < 20}">{{book.price}}</td>
            <td>{{book.rating}}</td>
            <td>
                @if (coverIsVisible) {
                <img [src]="book.coverUrl" [style.width.px]="bildbreite">
                }
            </td>
        </tr>
        }

    </table>
    }

    <hr />


    {{books | json}}
